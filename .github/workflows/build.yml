name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # FAILSAFE: If gradlew is missing, this creates it on the fly
      - name: Validate or Generate Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found. Generating wrapper..."
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Odido-Player-Debug
          path: "**/build/outputs/apk/debug/*.apk"
